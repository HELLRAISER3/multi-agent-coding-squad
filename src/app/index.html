<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Squad Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
        pre { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen flex flex-col font-mono">

    <header class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tighter text-blue-400">AGENTS_SQUAD_V1.0</h1>
        <div id="status" class="text-xs uppercase tracking-widest text-zinc-500">System Idle</div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 space-y-6" id="chat-container">
        <div class="text-zinc-500 text-sm italic">Chat history:</div>
    </main>

    <footer class="p-6 border-t border-zinc-800 bg-zinc-900/50">
        <div class="max-w-4xl mx-auto flex gap-4">
            <textarea 
                id="user-input" 
                rows="3" 
                class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg p-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
                placeholder="Enter technical requirements (e.g., 'Build a Fibonacci sequence')..."
            ></textarea>
            <button 
                onclick="sendRequest()" 
                id="send-btn"
                class="bg-blue-600 hover:bg-blue-500 transition-colors px-6 rounded-lg font-bold text-white uppercase text-xs"
            >
                Invoke
            </button>
        </div>
    </footer>

    <script>
        const API_URL = "http://localhost:8000";
        // Persistence: keep the session ID in local storage
        let sessionId = localStorage.getItem('squad_session_id') || "";

        async function sendRequest() {
            const inputField = document.getElementById('user-input');
            const chatContainer = document.getElementById('chat-container');
            const status = document.getElementById('status');
            const btn = document.getElementById('send-btn');
            
            const content = inputField.value.trim();
            if (!content) return;

            // UI Updates
            status.innerText = "Processing...";
            status.classList.add('text-yellow-500');
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                // Construct URL with query parameters
                const params = new URLSearchParams({ content: content });
                const response = await fetch(`${API_URL}/invoke`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json', // Critical
                    'x-session-id': sessionId
                },
                body: JSON.stringify({ content: content }) // Send as JSON body
            });

                if (!response.ok) throw new Error("Agent failed to respond.");

                const data = await response.json();

                const squadResult = data.output; 

                if (data.session_id) {
                    sessionId = data.session_id;
                    localStorage.setItem('squad_session_id', sessionId);
                }

                renderMessage('User', content, 'text-blue-400');
                renderMessage('AI_CODER_OUTPUT', squadResult, 'text-green-400', true);

            } catch (err) {
                renderMessage('SYSTEM_ERROR', err.message, 'text-red-500');
            } finally {
                status.innerText = "System Idle";
                status.classList.remove('text-yellow-500');
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                inputField.value = "";
            }
        }

        function renderMessage(role, text, colorClass, isCode = false) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = "space-y-2 mb-8";
            
            const header = `<div class="text-xs font-bold ${colorClass}">[${role}]</div>`;
            const body = isCode 
                ? `<pre class="bg-zinc-900 p-4 rounded border border-zinc-800 text-sm text-zinc-300"><code>${text}</code></pre>`
                : `<div class="text-sm leading-relaxed">${text}</div>`;
            
            div.innerHTML = header + body;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
